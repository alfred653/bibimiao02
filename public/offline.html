<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>比比喵 - 离线</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #121110;
      color: #f0ede5;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 320px;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      border-radius: 16px;
      background: #1a1a17;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }
    h1 { font-size: 20px; margin-bottom: 8px; }
    p { font-size: 14px; color: #8b8a7e; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #d97706;
      color: #121110;
      border: none;
      padding: 10px 28px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { background: #b45309; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>当前处于离线状态</h1>
    <p>请检查网络连接后重试。已缓存的页面仍可浏览。</p>
    <button onclick="location.reload()">重新连接</button>
  </div>
</body>
</html>
